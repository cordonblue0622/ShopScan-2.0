name: shopscan
description: A production-quality POS mobile application for small to medium businesses.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0

  # Google and Facebook Sign-In
  google_sign_in: ^6.1.0
  flutter_facebook_auth: ^7.1.0
  provider: ^6.0.0

  # Barcode scanning
  mobile_scanner: ^3.5.0
  js: ^0.6.7
  
  # Receipt printing
  esc_pos_printer: ^4.1.0

  # Navigation
  go_router: ^10.0.0

  # UI and styling
  flutter_screenutil: ^5.9.0
  
  # API and networking
  http: ^1.1.0
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.2.0

  # Date and time formatting
  intl: ^0.19.0

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
